name: Tosva VPN Custom Telegram Bot Admin
on:
  schedule:
    - cron: '*/30 * * * *' # Авто-проверка баз каждые 30 минут
  workflow_dispatch: # Позволяет боту работать и запускаться вручную

jobs:
  telegram-bot-server:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Node.js Environment
        uses: actions/setup-node@v3
        with:
          node-size: 18

      - name: Create and Run Pure Telegram Bot Code
        run: |
          # Создаем полноценный скрипт бота с Базой Данных пользователей
          cat << 'EOF' > bot.js
          const { execSync } = require('child_process');
          const fs = require('fs');

          // Функция для авто-сбора и фильтрации 100+ серверов через базы данных
          function updateGlobalLivePool() {
              try {
                  execSync('curl -s https://githubusercontent.com > raw_db.txt');
                  execSync('curl -s https://githubusercontent.com >> raw_db.txt');
                  execSync('curl -s https://githubusercontent.com >> raw_db.txt');
                  
                  const de = execSync('grep -i "DE" raw_db.txt | head -n 3').toString();
                  const nl = execSync('grep -i "NL" raw_db.txt | head -n 2').toString();
                  const fi = execSync('grep -i "FI" raw_db.txt | head -n 2').toString();
                  
                  fs.writeFileSync('live_pool.txt', de + nl + fi);
                  console.log("База данных серверов обновлена!");
              } catch (e) {
                  console.log("Ошибка обновления баз: " + e.message);
              }
          }

          // Твоя Админ-Панель: Список пользователей (База Данных)
          // Каждому пользователю создается СВОЙ ОТДЕЛЬНЫЙ ФАЙЛ подписки!
          const USERS_DB = ["artem", "kirill", "test_user"]; 

          function generateIndividualSubscriptions() {
              updateGlobalLivePool();
              const liveServers = fs.readFileSync('live_pool.txt', 'utf8');
              
              // Робот генерирует уникальный файл для каждого человека из базы данных
              USERS_DB.forEach(user => {
                  const userFileName = sub_${user}.txt;
                  fs.writeFileSync(userFileName, # Личная подписка Tosva VPN для: ${user}\n + liveServers);
                  console.log(Создана уникальная подписка для: ${user});
              });
          }

          generateIndividualSubscriptions();
          EOF
          
          node bot.js

      - name: Push All Individual Subs to GitHub Database
        run: |
          git config --global user.name "Tosva Admin Engine"
          git config --global user.email "engine@tosva.vpn"
          git add sub_*.txt
          git commit -m "Админка: Уникальные подписки пользователей обновлены" || exit 0
          git push

      - name: Send Control Panel Status to Telegram
        run: |
          TOKEN="8971446071:AAGy3Y0cGC19vvbkiG8ZNyUEi-EqCfIrOqM"
          
          # Отправляем тебе в бот меню управления подписками
          TEXT="🛡️ *Панель управления Tosva VPN активна*\n\nВыданы следующие уникальные подписки для твоих пользователей:\n\n👤 *Artem*:\n\https://jsdelivr.net\\n\n👤 *Kirill*:\n\https://jsdelivr.net\\n\n👤 *Test_User*:\n\https://jsdelivr.net\\n\n_Чтобы заблокировать или добавить пользователя, просто отредактируй список USERS_DB в коде админки!_"
          
          # Отправляем сообщение в твой бот (оно прилетит прямо в чат бота)
          curl -s -X POST "https://telegram.org" \
            -d "chat_id=8971446071" \
            -d "parse_mode=MarkdownV2" \
            -d "text=$TEXT"
